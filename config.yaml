llm:
  provider: "deepseek"  # Options: openai, azure, ollama, deepseek
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com/v1"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""
  api_key: ""            # 生产环境通过环境变量 LLM_API_KEY 设置
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "openai"  # 复用 OpenAI provider，通过 base_url 接入阿里云百炼兼容模式
  model: "text-embedding-v3"
  dimensions: 1024  # text-embedding-v3 默认维度
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: ""            # 生产环境通过环境变量 EMBEDDING_API_KEY 设置

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true                    # 启用图片自动描述
  provider: "openai"               # 复用 OpenAI-compatible provider
  model: "kimi-latest"             # Kimi 支持 Vision 的模型
  api_key: ""                      # 生产环境通过环境变量 VISION_API_KEY 设置
  base_url: "https://api.moonshot.cn/v1"
  max_image_size: 2048             # Max dimension (width/height) for image compression
